<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGI Executive Console</title>
    <style>
        :root {
            /* Colors optimized from your Deep Space image */
            --space-black: #020b12;
            --deep-teal: #0d4d44;
            --rich-green: #074a3f;
            --text-main: #e6f1ff;
            --text-dim: #94a3b8;
            --border-glow: rgba(13, 77, 68, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: var(--space-black);
            /* Background uses a gradient overlay to blend your space colors perfectly */
            background-image: linear-gradient(135deg, rgba(2, 11, 18, 0.9) 0%, rgba(13, 77, 68, 0.4) 100%), 
                              url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&w=2048&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            color: var(--text-main);
        }

        header {
            padding: 15px 25px;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid var(--border-glow);
            backdrop-filter: blur(15px);
            font-size: 0.75rem;
            letter-spacing: 3px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        #chat-window {
            flex-grow: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* User Message: Right Aligned, Dark Teal Bubble */
        .user-row {
            align-self: flex-end;
            max-width: 75%;
        }

        .user-bubble {
            background: rgba(13, 77, 68, 0.5);
            padding: 14px 20px;
            border-radius: 20px 20px 4px 20px;
            border: 1px solid var(--border-glow);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            font-size: 1rem;
            line-height: 1.5;
        }

        /* AGI Message: Left Aligned, Transparent Void Bubble */
        .agi-row {
            align-self: flex-start;
            max-width: 80%;
        }

        .agi-bubble {
            background: rgba(2, 11, 18, 0.7);
            padding: 16px 22px;
            border-radius: 20px 20px 20px 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 1rem;
            line-height: 1.6;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        /* Bottom Input Section */
        .controls {
            padding: 40px 20px;
            background: linear-gradient(transparent, var(--space-black));
        }

        .input-pill {
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--border-glow);
            border-radius: 35px;
            padding: 10px 20px;
            backdrop-filter: blur(20px);
            align-items: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            outline: none;
            font-size: 1rem;
        }

        button {
            background: var(--text-main);
            color: var(--space-black);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.2s ease;
        }

        button:hover {
            transform: scale(1.1);
            background: #ffffff;
        }

        .system-alert {
            color: #ff5555;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 15px;
            font-weight: 600;
        }

        /* Smooth Scrollbar */
        #chat-window::-webkit-scrollbar { width: 4px; }
        #chat-window::-webkit-scrollbar-thumb { background: var(--rich-green); border-radius: 10px; }
    </style>
</head>
<body>

    <header>Network Status: Encrypted // AGI Core v1.0</header>
    
    <div id="chat-window">
        <div class="agi-row">
            <div class="agi-bubble">Systems stabilized. Deep Space link established. How can I assist you today?</div>
        </div>
    </div>

    <div class="controls">
        <div class="input-pill">
            <input type="text" id="userInput" placeholder="Type a command..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">➤</button>
        </div>
        <div id="error-display" class="system-alert" style="display:none">CRITICAL: CONNECTION TIMEOUT. Verify Vercel API Settings.</div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const window = document.getElementById('chat-window');
            const errorDisplay = document.getElementById('error-display');
            const message = input.value.trim();
            
            if (!message) return;

            errorDisplay.style.display = 'none';
            
            // Add User Message (Right)
            window.innerHTML += `<div class="user-row"><div class="user-bubble">${message}</div></div>`;
            input.value = '';
            window.scrollTop = window.scrollHeight;

            try {
                const response = await fetch('/api/agi-brain.js', { 
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt: userMessage })
});


                const data = await response.json();
                if (data.error) throw new Error(data.error);
                
                // Add AGI Response (Left)
                window.innerHTML += `<div class="agi-row"><div class="agi-bubble">${data.reply}</div></div>`;
            } catch (err) {
                errorDisplay.style.display = 'block';
            }
            window.scrollTop = window.scrollHeight;
        }
    </script>
</body>
</html>
